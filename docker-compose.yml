services:
  pretgo:
    build: .
    container_name: pretgo
    ports:
      - "${PRETGO_PORT:-5000}:5000"
    volumes:
      - ${PRETGO_DATA_PATH:-./docker-data/data}:/app/data
      - ${PRETGO_UPLOADS_PATH:-./docker-data/uploads/materiel}:/app/static/uploads/materiel
    restart: unless-stopped
    stop_grace_period: 20s
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-}
      FLASK_DEBUG: "0"
      TZ: ${TZ:-Europe/Paris}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:5000/', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    mem_limit: 512m
